<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            gap: 2rem;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Первый текст - меняет только цвет */
        .text-color-hover {
            font-size: 24px;
            color: #333;
            transition: color 0.3s ease;
        }

        .text-color-hover:hover {
            color: #ff4444;
        }

        /* Второй текст - меняет цвет и фон */
        .text-bg-hover {
            font-size: 24px;
            color: #333;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .text-bg-hover:hover {
            color: white;
            background-color: #4CAF50;
        }

        /* Картинка - меняет насыщенность */
        .image-hover {
            max-width: 300px;
            border-radius: 10px;
            transition: filter 0.3s ease;
        }

        .image-hover:hover {
            filter: saturate(200%);
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="text-color-hover">При наведении на этот текст изменится только его цвет</p>
        <p class="text-bg-hover">При наведении на этот текст изменится его цвет и фон</p>
        <img src="https://picsum.photos/300/200" alt="Random image" class="image-hover">
    </div>
</body>
</html>
